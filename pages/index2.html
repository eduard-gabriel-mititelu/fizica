              height: 25px;

              -webkit-transition: .2s;
              transition: opacity .2s;
              border-radius: 20px;
            }
            
            .slider::-webkit-slider-thumb {
              -webkit-appearance: none;
              appearance: none;
              width: 25px;
              height: 25px;
              background: #fff;
              cursor: pointer;
              border-radius: 20px;
            }
            
            .slider::-moz-range-thumb {
              width: 25px;
              height: 25px;
              background: #04AA6D;
              cursor: pointer;
            }
